# Used INSIDE netlify-site/ for drag-and-drop deploy only.
# Do NOT set publish = "netlify-site" here — files are already at the upload root.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
